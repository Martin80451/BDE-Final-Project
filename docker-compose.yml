version: "3"
services:
  minio:
    image: minio/minio
    container_name: minio
    command: minio server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=user
      - MINIO_ROOT_PASSWORD=user12345
      - MINIO_DEFAULT_BUCKETS=buck1
    networks:
      mynet:
        aliases:
          - my-localhost # Alias for localhost access
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
networks:
  mynet:
    driver: bridge
volumes:
  minio_data:
    driver: local
