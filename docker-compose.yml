version: "3"
services:
  minio:
    image: minio/minio
    container_name: minio
    command: minio server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=user
      - MINIO_ROOT_PASSWORD=user12345
      - MINIO_DEFAULT_BUCKETS=buck1
    networks:
      mynet:
        aliases:
          - my-localhost # Alias for localhost access
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
  spark-master:
    image: spark
    build: .
    container_name: spark-master
    networks:
      - sparkpg_network
    entrypoint: /bin/bash
    command: -c "/opt/spark/sbin/start-master.sh; tail -f /dev/null"
    ports:
      - "8080:8080"
      - "4040:4040"
    volumes:
      - spark-events:/opt/spark/events

  spark-worker:
    image: spark
    build: .
    container_name: spark-worker1
    networks:
      - sparkpg_network
    entrypoint: /bin/bash
    command: -c "/opt/spark/sbin/start-worker.sh  spark://spark-master:7077; tail -f /dev/null"
    volumes:
      - spark-events:/opt/spark/events

  spark-history-server:
    image: spark
    build: .
    container_name: spark-history-server
    networks:
      - sparkpg_network
    entrypoint: /bin/bash
    command: -c "/opt/spark/sbin/start-history-server.sh; tail -f /dev/null"
    volumes:
      - spark-events:/opt/spark/events
    ports:
      - "18080:18080"
networks:
  sparkpg_network:
  mynet:
    driver: bridge
volumes:
  minio_data:
    driver: local
  spark-events:
